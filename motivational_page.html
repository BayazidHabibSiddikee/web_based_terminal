<!DOCTYPE html>
<html lang='en'>

<head>
    <meta charset='UTF-8'>
    <style>
        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(0, 0, 0, 0.4);
            padding: 40pt;
            border-radius: 15pt;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 80%;
        }

        h1 {
            font-size: 32pt;
            margin-bottom: 20pt;
            text-transform: uppercase;
            letter-spacing: 2pt;
        }

        p {
            font-size: 16pt;
            line-height: 1.6;
            margin-bottom: 30pt;
            font-style: italic;
        }

        .button {
            display: inline-block;
            padding: 12pt 24pt;
            background-color: #fbbf24;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50pt;
            font-size: 14pt;
            transition: transform 0.2s;
        }

        .footer {
            position: absolute;
            bottom: 20pt;
            font-size: 10pt;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Stay Disciplined</h1>
        <p>"The pain of <a href="index.html">discipline</a> is far less than the pain of regret. Your potential is
            limited only by the excuses you decide to believe."</p>
        <div class="button">Keep Pushing Forward</div>
    </div>
    <div class="footer">Fedora Linux Environment - System Active</div>
</body>

</html>
